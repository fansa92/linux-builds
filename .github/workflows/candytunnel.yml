name: Build and Release

# 只保留手动触发
on:
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号 (例如: 4.1.0)'
        required: true
        default: '4.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout AmiRCandy/CandyTunnel
        uses: actions/checkout@v4
        with:
          repository: AmiRCandy/CandyTunnel
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build Release
        run: cargo build --release --bins

      - name: Determine Version
        id: version
        run: echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Rename binaries with version
        run: |
          cp target/release/client CandyTunnel-client-linux-x86_64-v${{ steps.version.outputs.VERSION }}
          cp target/release/server CandyTunnel-server-linux-x86_64-v${{ steps.version.outputs.VERSION }}
          cp target/release/candy-tunnel CandyTunnel-linux-x86_64-v${{ steps.version.outputs.VERSION }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: CandyTunnel-*-linux-x86_64-v*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout AmiRCandy/CandyTunnel
        uses: actions/checkout@v4
        with:
          repository: AmiRCandy/CandyTunnel
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Release
        run: cargo build --release --bins

      - name: Determine Version
        id: version
        shell: bash
        run: echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Rename binaries with version
        shell: bash
        run: |
          cp target/release/client.exe CandyTunnel-client-windows-x86_64-v${{ steps.version.outputs.VERSION }}.exe
          cp target/release/server.exe CandyTunnel-server-windows-x86_64-v${{ steps.version.outputs.VERSION }}.exe
          cp target/release/candy-tunnel.exe CandyTunnel-windows-x86_64-v${{ steps.version.outputs.VERSION }}.exe

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: CandyTunnel-*-windows-x86_64-v*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout AmiRCandy/CandyTunnel
        uses: actions/checkout@v4
        with:
          repository: AmiRCandy/CandyTunnel
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --bins

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin --bins

      - name: Determine Version
        id: version
        run: echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Rename binaries with version
        run: |
          cp target/x86_64-apple-darwin/release/client CandyTunnel-client-macos-x86_64-v${{ steps.version.outputs.VERSION }}
          cp target/aarch64-apple-darwin/release/client CandyTunnel-client-macos-arm64-v${{ steps.version.outputs.VERSION }}
          cp target/x86_64-apple-darwin/release/server CandyTunnel-server-macos-x86_64-v${{ steps.version.outputs.VERSION }}
          cp target/aarch64-apple-darwin/release/server CandyTunnel-server-macos-arm64-v${{ steps.version.outputs.VERSION }}
          cp target/x86_64-apple-darwin/release/candy-tunnel CandyTunnel-macos-x86_64-v${{ steps.version.outputs.VERSION }}
          cp target/aarch64-apple-darwin/release/candy-tunnel CandyTunnel-macos-arm64-v${{ steps.version.outputs.VERSION }}

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: CandyTunnel-*-macos-*

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: CandyTunnel-v${{ github.event.inputs.version }}
          name: "CandyTunnel v${{ github.event.inputs.version }}"
          body: |
            ## CandyTunnel v${{ github.event.inputs.version }}
            
            **Multi-platform Release**
          draft: false
          prerelease: false
          files: |
            linux-binaries/*
            windows-binaries/*
            macos-binaries/*

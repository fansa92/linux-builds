name: Build and Release wireguard-go

on:
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号 (例如: 0.0.20250522)'
        required: true
        default: '0.0.20250522'
        
permissions:
  contents: write   # 允许创建 Release
  
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: amd64
            suffix: linux-amd64

          - os: ubuntu-latest
            target: linux
            arch: arm64
            suffix: linux-arm64

          # - os: windows-latest
          #   target: windows
          #   arch: amd64
          #   suffix: windows-amd64.exe

          - os: macos-latest
            target: darwin
            arch: amd64
            suffix: macos-amd64

          - os: macos-latest
            target: darwin
            arch: arm64
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: WireGuard/wireguard-go
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          GOOS=${{ matrix.target }} \
          GOARCH=${{ matrix.arch }} \
          go build -trimpath -ldflags="-s -w" -o wireguard-go-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-go-${{ matrix.suffix }}
          path: wireguard-go-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wireguard-go-*
          merge-multiple: true
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用手动输入的版本号
          tag_name: "wireguard-go-v${{ github.event.inputs.version }}"
          name: "wireguard-go ${{ github.event.inputs.version }}"
          body: |
            ## wireguard-go ${{ github.event.inputs.version }}
            
            Multi-platform build.
          draft: false
          prerelease: false
          files: |
            wireguard-go-*

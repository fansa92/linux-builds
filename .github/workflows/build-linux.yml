name: Build Linux Kernel and Create Bootable ISO

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version (e.g. 7.1.2)'
        required: true
        default: '7.1.2'
      busybox_version:
        description: ' busybox version (e.g. 1.38.0)'
        required: true
        default: '1.38.0'
      config_type:
        description: 'Kernel config type'
        required: true
        type: choice
        default: 'defconfig'
        options:
          - defconfig
          - allmodconfig
          - localmodconfig
permissions:
  contents: write   # 允许创建 Release
  
env:
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '7.1.2' }}
  CONFIG_TYPE: ${{ github.event.inputs.config_type || 'defconfig' }}
  BUSYBOX_VERSION: ${{ github.event.inputs.busybox_version || '1.38.0' }}
  ISO_BUSYBOX: "linux-bootable-busybox-${{ github.event.inputs.kernel_version }}.iso"
  ISO_GNU: "linux-bootable-gnu-${{ github.event.inputs.kernel_version }}.iso"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ============================================================
      # 1. 安装依赖
      # ============================================================
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev dwarves zstd bc perl \
            ccache qemu-system-x86 qemu-utils ovmf \
            wget xz-utils cpio gzip \
            grub-pc-bin grub-efi-amd64-bin xorriso mtools \
            isolinux syslinux-common  musl-tools bc pkg-config

      # ============================================================
      # 2. 下载内核源码
      # ============================================================
      - name: Download Kernel Source
        run: |
          echo "Cloning Linux Kernel v$KERNEL_VERSION..."
          git clone --depth 1 --branch "v$KERNEL_VERSION" \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
            "linux-$KERNEL_VERSION"
          echo "KERNEL_DIR=$PWD/linux-$KERNEL_VERSION" >> $GITHUB_ENV


      # ============================================================
      # 3. 配置内核
      # ============================================================
      - name: Configure Kernel
        run: |
          cd "$KERNEL_DIR"

          case "$CONFIG_TYPE" in
            defconfig)      make defconfig ;;
            allmodconfig)   make allmodconfig ;;
            localmodconfig) make localmodconfig ;;
          esac

          # 关键驱动内建
          ./scripts/config --enable CONFIG_NET
          ./scripts/config --enable CONFIG_INET
          ./scripts/config --enable CONFIG_PACKET
          ./scripts/config --enable CONFIG_UNIX
          ./scripts/config --enable CONFIG_NETDEVICES
          ./scripts/config --enable CONFIG_E1000
          ./scripts/config --enable CONFIG_E1000E
          ./scripts/config --enable CONFIG_R8169
          ./scripts/config --enable CONFIG_VIRTIO_NET
          ./scripts/config --enable CONFIG_EXT4_FS
          ./scripts/config --enable CONFIG_FAT_FS
          ./scripts/config --enable CONFIG_NTFS_FS
          ./scripts/config --enable CONFIG_TMPFS
          ./scripts/config --enable CONFIG_PROC_FS
          ./scripts/config --enable CONFIG_SYSFS
          ./scripts/config --enable CONFIG_DEVTMPFS
          ./scripts/config --enable CONFIG_DEVTMPFS_MOUNT
          ./scripts/config --enable CONFIG_USB
          ./scripts/config --enable CONFIG_USB_XHCI_HCD
          ./scripts/config --enable CONFIG_USB_EHCI_HCD
          ./scripts/config --enable CONFIG_USB_STORAGE
          ./scripts/config --enable CONFIG_CDROM
          ./scripts/config --enable CONFIG_ISO9660_FS
          ./scripts/config --disable CONFIG_DEBUG_INFO
          ./scripts/config --disable CONFIG_DEBUG_INFO_BTF

          make olddefconfig
      # ============================================================
      # 4. 编译 BusyBox
      # ============================================================
      - name: Build BusyBox
        run: |
          wget -q "https://busybox.net/downloads/busybox-$BUSYBOX_VERSION.tar.bz2"
          tar -xf "busybox-$BUSYBOX_VERSION.tar.bz2"
          cd "busybox-$BUSYBOX_VERSION"

          make defconfig

          # 直接覆盖配置（推荐使用 cat > 而不是 >>）
          cat > .config << 'EOL'
          CONFIG_DESKTOP=y
          CONFIG_STATIC=y
          CONFIG_IFCONFIG=y
          CONFIG_IP=y
          CONFIG_ROUTE=y
          CONFIG_UDHCPC=y
          CONFIG_IFUP=y
          CONFIG_IFDOWN=y
          CONFIG_PING=y
          CONFIG_WGET=y
          CONFIG_NSLOOKUP=y
          CONFIG_NETSTAT=y
          CONFIG_TELNET=y
          CONFIG_NC=y
          CONFIG_HTTPD=y
          CONFIG_UDHCPC_DEFAULT_SCRIPT=y
          CONFIG_SH=y
          CONFIG_ASH=y
          CONFIG_BASH=y 
          CONFIG_VI=y
          CONFIG_LS=y
          CONFIG_CP=y
          CONFIG_MV=y
          CONFIG_RM=y
          CONFIG_CAT=y
          CONFIG_ECHO=y
          CONFIG_GREP=y
          CONFIG_FIND=y
          CONFIG_TAR=y
          CONFIG_GZIP=y
          CONFIG_MOUNT=y
          CONFIG_UMOUNT=y
          # 关闭问题选项
          # CONFIG_TC is not set
          # CONFIG_KLOGD is not set
          # CONFIG_LOGGER is not set
          # CONFIG_SELINUX is not set
          EOL

          # 关键：用这个命令处理新选项
          yes "" | make oldconfig >/dev/null 2>&1 || true

          echo "=== CONFIG 检查 ==="
          grep -E "CONFIG_(STATIC|DESKTOP|TC)=" .config

          echo "=== 开始编译 ==="
          make -j$(nproc) 2>&1 | tee build.log

          echo "=== 最后 80 行日志 ==="
          tail -80 build.log

          if [ -f busybox ] || [ -f busybox_unstripped ]; then
            echo "✅ Build successful!"
            ls -lh busybox*
            make install CONFIG_PREFIX=_install
            echo "BUSYBOX_INSTALL=$PWD/_install" >> $GITHUB_ENV
          else
            echo "❌ Build failed!"
            exit 1
          fi
      - name: Build GNU Coreutils and Bash
        run: |
          wget -q https://ftp.gnu.org/gnu/bash/bash-5.3.tar.gz -O bash.tar.gz
          tar -xzf bash.tar.gz
          cd bash-5.3 && ./configure --prefix=/usr --without-bash-malloc --disable-nls && make -j$(nproc) CFLAGS="-Os -s" && make install DESTDIR=$PWD/install && cd ..

          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-9.11.tar.xz -O coreutils.tar.xz
          tar -xf coreutils.tar.xz
          cd coreutils-9.11 && ./configure --prefix=/usr --enable-no-install-program=kill,uptime --disable-nls CFLAGS="-Os -s" && make -j$(nproc) && make install DESTDIR=$PWD/install && cd ..

          echo "GNU_TOOLS_INSTALL=$PWD" >> $GITHUB_ENV
      # ============================================================
      # 5. 编译内核
      # ============================================================
      - name: Build Kernel
        run: |
          cd "$KERNEL_DIR"
          echo "Build started at $(date)"
          START=$(date +%s)

          make -j$(nproc) 2>&1 | tail -100

          END=$(date +%s)
          echo "Build time: $((END - START)) seconds"
          echo "BUILD_TIME=$((END - START))" >> $GITHUB_ENV

          ls -lh arch/x86/boot/bzImage
          echo "BZIMAGE_PATH=$KERNEL_DIR/arch/x86/boot/bzImage" >> $GITHUB_ENV

      

      # ============================================================
      # 6. 制作 initramfs
      # ============================================================
      - name: Create Initramfs - BusyBox Version
        run: |
          echo "=== Creating BusyBox Initramfs ==="
          INITRAMFS_DIR="$PWD/initramfs-busybox"
          mkdir -p "$INITRAMFS_DIR"/{bin,sbin,etc,etc/network,proc,sys,dev,lib,usr/bin,usr/sbin,usr/share/udhcpc,var,run,tmp,root}
          chmod 1777 "$INITRAMFS_DIR/tmp"

          # 复制 BusyBox
          cp -a "$BUSYBOX_INSTALL"/* "$INITRAMFS_DIR/"

          # 创建常用命令软链接
          cd "$INITRAMFS_DIR/bin"
          for cmd in ls cp mv rm cat echo grep find tar mkdir vi; do
              ln -s busybox "$cmd" 2>/dev/null || true
          done

          # 网络配置（保持你原来的）
          cat > "$INITRAMFS_DIR/etc/network/interfaces" << 'CONF'
          auto eth0
          iface eth0 inet dhcp
          CONF

          cat > "$INITRAMFS_DIR/usr/share/udhcpc/default.script" << 'SCRIPT'
          #!/bin/sh
          case "$1" in
              deconfig) ifconfig $interface 0.0.0.0 ;;
              bound|renew)
                  ifconfig $interface $ip netmask $subnet
                  if [ -n "$router" ]; then
                      route del default gw 0.0.0.0 dev $interface 2>/dev/null
                      for i in $router; do route add default gw $i dev $interface; done
                  fi
                  if [ -n "$dns" ]; then
                      > /etc/resolv.conf
                      for i in $dns; do echo "nameserver $i" >> /etc/resolv.conf; done
                  fi
                  ;;
          esac
          SCRIPT
          chmod +x "$INITRAMFS_DIR/usr/share/udhcpc/default.script"

          cat > "$INITRAMFS_DIR/etc/resolv.conf" << 'DNS'
          nameserver 8.8.8.8
          nameserver 1.1.1.1
          DNS

          cat > "$INITRAMFS_DIR/etc/passwd" << 'PASSWD'
          root::0:0:root:/root:/bin/sh
          PASSWD

          cat > "$INITRAMFS_DIR/etc/group" << 'GROUP'
          root:x:0:
          GROUP

          cat > "$INITRAMFS_DIR/init" << 'INIT'
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev
          mount -t tmpfs none /tmp
          echo "BusyBox Linux $KERNEL_VERSION ready!"
          exec /bin/sh
          INIT
          chmod +x "$INITRAMFS_DIR/init"

          cd "$INITRAMFS_DIR"
          find . | cpio -H newc -o | gzip -9 > "$GITHUB_WORKSPACE/initramfs-busybox.cpio.gz"
          echo "INITRAMFS_BUSYBOX=$GITHUB_WORKSPACE/initramfs-busybox.cpio.gz" >> $GITHUB_ENV
      - name: Create Initramfs - GNU Version
        run: |
          echo "=== Creating GNU Initramfs ==="
          INITRAMFS_DIR="$PWD/initramfs-gnu"
          mkdir -p "$INITRAMFS_DIR"/{bin,sbin,etc,etc/network,proc,sys,dev,lib,lib64,usr/bin,usr/sbin,usr/share/udhcpc,var,run,tmp,root}
          chmod 1777 "$INITRAMFS_DIR/tmp"

          # 复制 GNU 工具
          cp "$GNU_TOOLS_INSTALL/bash-5.2.37/install/usr/bin/bash" "$INITRAMFS_DIR/bin/" || true
          cp -a "$GNU_TOOLS_INSTALL/coreutils-9.6/install/usr/bin/"* "$INITRAMFS_DIR/usr/bin/" || true

          # 软链接
          cd "$INITRAMFS_DIR/bin"
          ln -sf bash sh || true
          ln -sf ../usr/bin/coreutils ls || true
          ln -sf ../usr/bin/coreutils cp || true
          ln -sf ../usr/bin/coreutils mv || true
          ln -sf ../usr/bin/coreutils rm || true

          # 网络和配置（同上）
          cat > "$INITRAMFS_DIR/etc/network/interfaces" << 'CONF'
          auto eth0
          iface eth0 inet dhcp
          CONF

          cat > "$INITRAMFS_DIR/usr/share/udhcpc/default.script" << 'SCRIPT'
          #!/bin/sh
          case "$1" in
              deconfig) ifconfig $interface 0.0.0.0 ;;
              bound|renew)
                  ifconfig $interface $ip netmask $subnet
                  if [ -n "$router" ]; then
                      route del default gw 0.0.0.0 dev $interface 2>/dev/null
                      for i in $router; do route add default gw $i dev $interface; done
                  fi
                  if [ -n "$dns" ]; then
                      > /etc/resolv.conf
                      for i in $dns; do echo "nameserver $i" >> /etc/resolv.conf; done
                  fi
                  ;;
          esac
          SCRIPT
          chmod +x "$INITRAMFS_DIR/usr/share/udhcpc/default.script"

          cat > "$INITRAMFS_DIR/etc/resolv.conf" << 'DNS'
          nameserver 8.8.8.8
          nameserver 1.1.1.1
          DNS

          cat > "$INITRAMFS_DIR/etc/passwd" << 'PASSWD'
          root::0:0:root:/root:/bin/bash
          PASSWD

          cat > "$INITRAMFS_DIR/etc/group" << 'GROUP'
          root:x:0:
          GROUP

          cat > "$INITRAMFS_DIR/init" << 'INIT'
          #!/bin/bash
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev
          mount -t tmpfs none /tmp
          echo "GNU Linux $KERNEL_VERSION ready! (bash + coreutils)"
          exec /bin/bash
          INIT
          chmod +x "$INITRAMFS_DIR/init"

          cd "$INITRAMFS_DIR"
          find . | cpio -H newc -o | gzip -9 > "$GITHUB_WORKSPACE/initramfs-gnu.cpio.gz"
          echo "INITRAMFS_GNU=$GITHUB_WORKSPACE/initramfs-gnu.cpio.gz" >> $GITHUB_ENV
      # ============================================================
      # 7. 打包为可启动 ISO（GRUB2 方案，支持 BIOS + UEFI）
      # ============================================================
      - name: Create ISO - GNU Version
        run: |
          echo "=== Creating GNU Version ISO ==="
          ISO_DIR="$PWD/iso-gnu"
          mkdir -p "$ISO_DIR/boot/grub"
          
          cp "$BZIMAGE_PATH" "$ISO_DIR/boot/bzImage"
          cp "$INITRAMFS_GNU" "$ISO_DIR/boot/initramfs.cpio.gz"   # 使用 GNU initramfs
          
          # GRUB 配置（GNU 版）
          cat > "$ISO_DIR/boot/grub/grub.cfg" << 'GRUB'
          set timeout=3
          menuentry "Custom Linux (GNU Version)" {
              linux /boot/bzImage console=tty0
              initrd /boot/initramfs.cpio.gz
          }
          GRUB
          
          grub-mkrescue -o "$GITHUB_WORKSPACE/$ISO_GNU" "$ISO_DIR"
          ls -lh "$GITHUB_WORKSPACE/$ISO_GNU"
          
      - name: Create ISO - BusyBox Version
        run: |
          echo "=== Creating bootable ISO ==="
          ISO_DIR="$PWD/iso_build"
          mkdir -p "$ISO_DIR/boot/grub"

          # 复制内核和 initramfs
          cp "$BZIMAGE_PATH" "$ISO_DIR/boot/bzImage"
          cp "$INITRAMFS_BUSYBOX" "$ISO_DIR/boot/initramfs.cpio.gz"

          # 创建 GRUB 配置
          cat > "$ISO_DIR/boot/grub/grub.cfg" << 'GRUBCFG'
          set timeout=5
          set default=0

          insmod all_video
          insmod gfxterm
          insmod part_msdos
          insmod ext2

          menuentry "Custom Linux $KERNEL_VERSION" {
              echo "Loading kernel..."
              linux  /boot/bzImage console=ttyS0 console=tty0
              echo "Loading initramfs..."
              initrd /boot/initramfs.cpio.gz
              echo "Booting..."
          }

          menuentry "Custom Linux $KERNEL_VERSION (Serial Console)" {
              linux  /boot/bzImage console=ttyS0,115200n8
              initrd /boot/initramfs.cpio.gz
          }

          menuentry "Custom Linux $KERNEL_VERSION (Verbose Boot)" {
              linux  /boot/bzImage console=tty0 loglevel=7 earlyprintk=tty0
              initrd /boot/initramfs.cpio.gz
          }
          GRUBCFG

          # 使用 grub-mkrescue 生成 Hybrid ISO
          grub-mkrescue -o "$GITHUB_WORKSPACE/linux-bootable.iso" "$ISO_DIR" \
            -V "CUSTOM_LINUX" \
            --modules="part_msdos ext2 fat iso9660 normal boot linux" 2>&1

          ls -lh "$GITHUB_WORKSPACE/linux-bootable.iso"

          # 验证 ISO 结构
          echo "=== ISO contents ==="
          xorriso -indev "$GITHUB_WORKSPACE/linux-bootable.iso" \
            -find / 2>/dev/null | head -30
          mv linux-bootable.iso "$ISO_BUSYBOX"
          echo "ISO_BUSYBOX_PATH=$ISO_BUSYBOX" >> $GITHUB_ENV

      # ============================================================
      # 8. QEMU 启动测试
      # ============================================================
      - name: QEMU Boot Test (BIOS)
        run: |
          echo "=== QEMU BIOS Boot Test (15s timeout) ==="
          timeout 15 qemu-system-x86_64 \
            -cdrom "${{ env.ISO_GNU }}" \
            -m 512M \
            -netdev user,id=net0 \
            -device e1000,netdev=net0 \
            -nographic 2>&1 | tail -40 || true
          timeout 15 qemu-system-x86_64 \
            -cdrom "${{ env.ISO_BUSYBOX }}" \
            -m 512M \
            -netdev user,id=net0 \
            -device e1000,netdev=net0 \
            -nographic 2>&1 | tail -40 || true

      - name: QEMU Boot Test (UEFI)
        run: |
          echo "=== QEMU UEFI Boot Test (15s timeout) ==="
          timeout 15 qemu-system-x86_64 \
            -cdrom "${{ env.ISO_GNU }}" \
            -m 512M \
            -bios /usr/share/OVMF/OVMF_CODE.fd \
            -netdev user,id=net0 \
            -device e1000,netdev=net0 \
            -nographic 2>&1 | tail -40 || true
            
          timeout 15 qemu-system-x86_64 \
            -cdrom "${{ env.ISO_BUSYBOX }}" \
            -m 512M \
            -bios /usr/share/OVMF/OVMF_CODE.fd \
            -netdev user,id=net0 \
            -device e1000,netdev=net0 \
            -nographic 2>&1 | tail -40 || true

      # ============================================================
      # 9. 上传产物
      # ============================================================
      - name: Upload Both ISOs
        uses: actions/upload-artifact@v4
        with:
          name: linux-bootable-${{ env.KERNEL_VERSION }}
          path: |
            ${{ env.ISO_BUSYBOX }}
            ${{ env.ISO_GNU }}

      # - name: Upload bzImage
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: bzImage-${{ env.KERNEL_VERSION }}
      #     path: ${{ env.BZIMAGE_PATH }}
      #     retention-days: 7

      # - name: Upload Initramfs
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: initramfs-${{ env.KERNEL_VERSION }}
      #     path: ${{ env.INITRAMFS_PATH }}
      #     retention-days: 7
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Linux-${{ env.KERNEL_VERSION }}
          name: Linux Bootable ISO - ${{ env.KERNEL_VERSION }}
          draft: false
          prerelease: false
          body: |
            ## Custom Linux ${{ env.KERNEL_VERSION }}

            - **ISO**: 可直接启动的 Live 系统
            - **bzImage**: 内核镜像
            - **initramfs**: 初始内存盘
            构建时间: ${{ github.event.head_commit.timestamp }}
          files: |
            ${{ env.ISO_BUSYBOX }}
            ${{ env.ISO_GNU }}
            ${{ env.INITRAMFS_GNU }}
            ${{ env.INITRAMFS_BUSYBOX }}
            ${{ env.BZIMAGE_PATH }}
            
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          

            
      # ============================================================
      # 10. 构建摘要
      # ============================================================
      - name: Build Summary
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Kernel Version | $KERNEL_VERSION |"
            echo "| Config Type | $CONFIG_TYPE |"
            echo "| Build Time | ${{ env.BUILD_TIME }} seconds |"
            echo "| ISO BUSYBOX Size | $(ls -lh ${{ env.ISO_BUSYBOX }} | awk '{print $5}') |"
            echo "| ISO GNU Size | $(ls -lh ${{ env.ISO_GNU }} | awk '{print $5}') |"
            echo "| bzImage Size | $(ls -lh ${{ env.BZIMAGE_PATH  }}| awk '{print $5}') |"
            echo "| Initramfs BUSYBOX Size | $(ls -lh ${{ env.INITRAMFS_BUSYBOX  }} | awk '{print $5}') |"
            echo "| Initramfs GNU Size | $(ls -lh ${{ env.INITRAMFS_GNU  }} | awk '{print $5}') |"
            echo ""
            echo "### How to Use"
            echo ""
            echo '```bash'
            echo "# QEMU 测试"
            echo "qemu-system-x86_64 -cdrom ${{ env.ISO_GNU }} -m 512M -nographic"
            echo "qemu-system-x86_64 -cdrom ${{ env.ISO_BUSYBOX }} -m 512M -nographic"
            echo ""
            echo "# 写入 U 盘"
            echo "sudo dd if=${{ env.ISO_GNU }} of=/dev/sdX bs=4M status=progress"
            echo "sudo dd if=${{ env.ISO_BUSYBOX }} of=/dev/sdX bs=4M status=progress"
            echo "sync"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

name: Build Linux Kernel and Create Bootable ISO

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version (e.g. 6.12.16)'
        required: true
        default: '6.12.16'
      config_type:
        description: 'Kernel config type'
        required: true
        type: choice
        default: 'defconfig'
        options:
          - defconfig
          - allmodconfig
          - localmodconfig

env:
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '6.12.16' }}
  CONFIG_TYPE: ${{ github.event.inputs.config_type || 'defconfig' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ============================================================
      # 1. 安装依赖
      # ============================================================
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev dwarves zstd bc perl \
            ccache qemu-system-x86 qemu-utils \
            wget xz-utils cpio gzip \
            grub-pc-bin grub-efi-amd64-bin xorriso mtools \
            isolinux syslinux-common ovmf

      # ============================================================
      # 2. 下载内核源码
      # ============================================================
      - name: Download Kernel Source
        run: |
          echo "Cloning Linux Kernel v$KERNEL_VERSION..."
          git clone --depth 1 --branch "v$KERNEL_VERSION" \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
            "linux-$KERNEL_VERSION"
          echo "KERNEL_DIR=$PWD/linux-$KERNEL_VERSION" >> $GITHUB_ENV


      # ============================================================
      # 3. 配置内核
      # ============================================================
      - name: Configure Kernel
        run: |
          cd "$KERNEL_DIR"

          case "$CONFIG_TYPE" in
            defconfig)      make defconfig ;;
            allmodconfig)   make allmodconfig ;;
            localmodconfig) make localmodconfig ;;
          esac

          # 关键驱动内建
          ./scripts/config --enable CONFIG_NET
          ./scripts/config --enable CONFIG_INET
          ./scripts/config --enable CONFIG_PACKET
          ./scripts/config --enable CONFIG_UNIX
          ./scripts/config --enable CONFIG_NETDEVICES
          ./scripts/config --enable CONFIG_E1000
          ./scripts/config --enable CONFIG_E1000E
          ./scripts/config --enable CONFIG_R8169
          ./scripts/config --enable CONFIG_VIRTIO_NET
          ./scripts/config --enable CONFIG_EXT4_FS
          ./scripts/config --enable CONFIG_FAT_FS
          ./scripts/config --enable CONFIG_NTFS_FS
          ./scripts/config --enable CONFIG_TMPFS
          ./scripts/config --enable CONFIG_PROC_FS
          ./scripts/config --enable CONFIG_SYSFS
          ./scripts/config --enable CONFIG_DEVTMPFS
          ./scripts/config --enable CONFIG_DEVTMPFS_MOUNT
          ./scripts/config --enable CONFIG_USB
          ./scripts/config --enable CONFIG_USB_XHCI_HCD
          ./scripts/config --enable CONFIG_USB_EHCI_HCD
          ./scripts/config --enable CONFIG_USB_STORAGE
          ./scripts/config --enable CONFIG_CDROM
          ./scripts/config --enable CONFIG_ISO9660_FS
          ./scripts/config --disable CONFIG_DEBUG_INFO
          ./scripts/config --disable CONFIG_DEBUG_INFO_BTF

          make olddefconfig

      # ============================================================
      # 4. 编译内核
      # ============================================================
      - name: Build Kernel
        run: |
          cd "$KERNEL_DIR"
          echo "Build started at $(date)"
          START=$(date +%s)

          make -j$(nproc) 2>&1 | tail -100

          END=$(date +%s)
          echo "Build time: $((END - START)) seconds"
          echo "BUILD_TIME=$((END - START))" >> $GITHUB_ENV

          ls -lh arch/x86/boot/bzImage
          echo "BZIMAGE_PATH=$KERNEL_DIR/arch/x86/boot/bzImage" >> $GITHUB_ENV

      # ============================================================
      # 5. 编译 BusyBox
      # ============================================================
      - name: Build BusyBox
        run: |
          wget -q "https://busybox.net/downloads/busybox-1.37.0.tar.bz2"
          tar -xf busybox-1.37.0.tar.bz2
          cd busybox-1.37.0

          make defconfig
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

          # 启用网络工具
          ./scripts/config --enable CONFIG_IFCONFIG
          ./scripts/config --enable CONFIG_IP
          ./scripts/config --enable CONFIG_ROUTE
          ./scripts/config --enable CONFIG_UDHCPC
          ./scripts/config --enable CONFIG_UDHCPC_DEFAULT_SCRIPT
          ./scripts/config --enable CONFIG_IFUP
          ./scripts/config --enable CONFIG_IFDOWN
          ./scripts/config --enable CONFIG_PING
          ./scripts/config --enable CONFIG_WGET
          ./scripts/config --enable CONFIG_NSLOOKUP
          ./scripts/config --enable CONFIG_NETSTAT
          ./scripts/config --enable CONFIG_TELNET
          ./scripts/config --enable CONFIG_NC
          ./scripts/config --enable CONFIG_HTTPD

          make oldconfig
          make -j$(nproc) 2>&1 | tail -10
          make install

          echo "BUSYBOX_INSTALL=$PWD/_install" >> $GITHUB_ENV

      # ============================================================
      # 6. 制作 initramfs
      # ============================================================
      - name: Create Initramfs
        run: |
          echo "=== Building initramfs ==="
          INITRAMFS_DIR="$PWD/initramfs"
          mkdir -p "$INITRAMFS_DIR"/{bin,sbin,etc,etc/network,proc,sys,dev,lib,usr,usr/share,usr/share/udhcpc,var,run,tmp,root}
          chmod 1777 "$INITRAMFS_DIR/tmp"

          # 复制 BusyBox
          cp -a "$BUSYBOX_INSTALL"/* "$INITRAMFS_DIR/"

          # 网络配置
          cat > "$INITRAMFS_DIR/etc/network/interfaces" << 'CONF'
          auto eth0
          iface eth0 inet dhcp
          CONF

          cat > "$INITRAMFS_DIR/usr/share/udhcpc/default.script" << 'SCRIPT'
          #!/bin/sh
          case "$1" in
              deconfig)
                  ifconfig $interface 0.0.0.0
                  ;;
              bound|renew)
                  ifconfig $interface $ip netmask $subnet
                  if [ -n "$router" ]; then
                      route del default gw 0.0.0.0 dev $interface 2>/dev/null
                      for i in $router; do
                          route add default gw $i dev $interface
                      done
                  fi
                  if [ -n "$dns" ]; then
                      > /etc/resolv.conf
                      for i in $dns; do
                          echo "nameserver $i" >> /etc/resolv.conf
                      done
                  fi
                  ;;
          esac
          SCRIPT
          chmod +x "$INITRAMFS_DIR/usr/share/udhcpc/default.script"

          cat > "$INITRAMFS_DIR/etc/resolv.conf" << 'DNS'
          nameserver 8.8.8.8
          nameserver 1.1.1.1
          DNS

          cat > "$INITRAMFS_DIR/etc/passwd" << 'PASSWD'
          root::0:0:root:/root:/bin/sh
          PASSWD

          cat > "$INITRAMFS_DIR/etc/group" << 'GROUP'
          root:x:0:
          GROUP

          # init 脚本
          cat > "$INITRAMFS_DIR/init" << 'INIT'
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev
          mount -t tmpfs none /tmp

          echo "============================================"
          echo "  Custom Linux $KERNEL_VERSION (ISO Boot)   "
          echo "============================================"
          echo ""

          echo "[*] CPU Info:"
          cat /proc/cpuinfo | head -5
          echo ""

          echo "[*] Memory:"
          cat /proc/meminfo | head -3
          echo ""

          echo "[*] Network interfaces:"
          ls /sys/class/net/
          echo ""

          echo "[*] Starting network (DHCP)..."
          udhcpc -i eth0 -s /usr/share/udhcpc/default.script -q -t 5 -T 2 2>&1
          echo ""

          echo "[*] Network status:"
          ifconfig eth0 2>/dev/null || echo "eth0 not found"
          echo ""

          echo "[*] Ping test:"
          ping -c 3 8.8.8.8 2>&1 || echo "Ping failed"
          echo ""

          echo "============================================"
          echo "  System ready! Dropping to shell."
          echo "============================================"

          exec /bin/sh
          INIT
          chmod +x "$INITRAMFS_DIR/init"

          # 打包 initramfs
          cd "$INITRAMFS_DIR"
          find . | cpio -H newc -o | gzip -9 > "$GITHUB_WORKSPACE/initramfs.cpio.gz"
          cd "$GITHUB_WORKSPACE"
          ls -lh initramfs.cpio.gz

          echo "INITRAMFS_PATH=$GITHUB_WORKSPACE/initramfs.cpio.gz" >> $GITHUB_ENV

      # ============================================================
      # 7. 打包为可启动 ISO（GRUB2 方案，支持 BIOS + UEFI）
      # ============================================================
      - name: Create Bootable ISO
        run: |
          echo "=== Creating bootable ISO ==="
          ISO_DIR="$PWD/iso_build"
          mkdir -p "$ISO_DIR/boot/grub"

          # 复制内核和 initramfs
          cp "$BZIMAGE_PATH" "$ISO_DIR/boot/bzImage"
          cp "$INITRAMFS_PATH" "$ISO_DIR/boot/initramfs.cpio.gz"

          # 创建 GRUB 配置
          cat > "$ISO_DIR/boot/grub/grub.cfg" << 'GRUBCFG'
          set timeout=5
          set default=0

          insmod all_video
          insmod gfxterm
          insmod part_msdos
          insmod ext2

          menuentry "Custom Linux $KERNEL_VERSION" {
              echo "Loading kernel..."
              linux  /boot/bzImage console=ttyS0 console=tty0
              echo "Loading initramfs..."
              initrd /boot/initramfs.cpio.gz
              echo "Booting..."
          }

          menuentry "Custom Linux $KERNEL_VERSION (Serial Console)" {
              linux  /boot/bzImage console=ttyS0,115200n8
              initrd /boot/initramfs.cpio.gz
          }

          menuentry "Custom Linux $KERNEL_VERSION (Verbose Boot)" {
              linux  /boot/bzImage console=tty0 loglevel=7 earlyprintk=tty0
              initrd /boot/initramfs.cpio.gz
          }
          GRUBCFG

          # 使用 grub-mkrescue 生成 Hybrid ISO
          grub-mkrescue -o "$GITHUB_WORKSPACE/linux-bootable.iso" "$ISO_DIR" \
            -V "CUSTOM_LINUX" \
            --modules="part_msdos ext2 fat iso9660 normal boot linux" 2>&1

          ls -lh "$GITHUB_WORKSPACE/linux-bootable.iso"

          # 验证 ISO 结构
          echo "=== ISO contents ==="
          xorriso -indev "$GITHUB_WORKSPACE/linux-bootable.iso" \
            -find / 2>/dev/null | head -30

          echo "ISO_PATH=$GITHUB_WORKSPACE/linux-bootable.iso" >> $GITHUB_ENV

      # ============================================================
      # 8. QEMU 启动测试
      # ============================================================
      - name: QEMU Boot Test (BIOS)
        run: |
          echo "=== QEMU BIOS Boot Test (15s timeout) ==="
          timeout 15 qemu-system-x86_64 \
            -cdrom "$ISO_PATH" \
            -m 512M \
            -netdev user,id=net0 \
            -device e1000,netdev=net0 \
            -nographic 2>&1 | tail -40 || true

      - name: QEMU Boot Test (UEFI)
        run: |
          echo "=== QEMU UEFI Boot Test (15s timeout) ==="
          timeout 15 qemu-system-x86_64 \
            -cdrom "$ISO_PATH" \
            -m 512M \
            -bios /usr/share/OVMF/OVMF_CODE.fd \
            -netdev user,id=net0 \
            -device e1000,netdev=net0 \
            -nographic 2>&1 | tail -40 || true

      # ============================================================
      # 9. 上传产物
      # ============================================================
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: linux-bootable-iso-${{ env.KERNEL_VERSION }}
          path: ${{ env.ISO_PATH }}
          retention-days: 7

      - name: Upload bzImage
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-${{ env.KERNEL_VERSION }}
          path: ${{ env.BZIMAGE_PATH }}
          retention-days: 7

      - name: Upload Initramfs
        uses: actions/upload-artifact@v4
        with:
          name: initramfs-${{ env.KERNEL_VERSION }}
          path: ${{ env.INITRAMFS_PATH }}
          retention-days: 7

      # ============================================================
      # 10. 构建摘要
      # ============================================================
      - name: Build Summary
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Kernel Version | $KERNEL_VERSION |"
            echo "| Config Type | $CONFIG_TYPE |"
            echo "| Build Time | ${{ env.BUILD_TIME }} seconds |"
            echo "| ISO Size | $(ls -lh $ISO_PATH | awk '{print $5}') |"
            echo "| bzImage Size | $(ls -lh $BZIMAGE_PATH | awk '{print $5}') |"
            echo "| Initramfs Size | $(ls -lh $INITRAMFS_PATH | awk '{print $5}') |"
            echo ""
            echo "### How to Use"
            echo ""
            echo '```bash'
            echo "# QEMU 测试"
            echo "qemu-system-x86_64 -cdrom linux-bootable.iso -m 512M -nographic"
            echo ""
            echo "# 写入 U 盘"
            echo "sudo dd if=linux-bootable.iso of=/dev/sdX bs=4M status=progress"
            echo "sync"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
